<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OPPO AI Phone</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<link rel="stylesheet" href="css/base.css"/>
<link rel="stylesheet" href="css/desktop.css"/>
<link rel="stylesheet" href="css/widget.css"/>
<link rel="stylesheet" href="css/settings.css"/>
</head>
<body>
<div id="app">
  <div class="phone-shell">
    <div class="key key-vu"></div>
    <div class="key key-vd"></div>
    <div class="key key-pw"></div>
    <div class="phone-screen">
      <div class="notch"><div class="notch-pill"></div></div>

      <div class="statusbar">
        <span class="sb-time">{{ sbTime }}</span>
        <div class="sb-right">
          <div class="sig"><span></span><span></span><span></span><span></span></div>
          <span class="ntype">5G</span>
          <div class="bat"><div class="bat-fill"></div></div>
        </div>
      </div>

      <div class="screen-content">
        <div class="loading-wrap" v-if="!dbReady">
          <div class="spinner"></div>
        </div>

        <template v-else>
          <div
            class="desktop"
            :class="settings.wallpaper.startsWith('custom-') ? '' : 'wp-'+settings.wallpaper"
            :style="settings.wallpaper && settings.wallpaper.startsWith('custom-') ? { backgroundImage: 'url(' + (customWallpapers.find(w => w.id === settings.wallpaper) || {src:''}).src + ')', backgroundSize:'cover', backgroundPosition:'center' } : {}"
            ref="desktopRef"
            @mousedown.self="onBgMousedown"
            @touchstart.self.passive="onBgTouchstart"
            @mouseup="onPointerUp"
            @mousemove="onPointerMove"
            @touchmove.passive="onTouchMove"
            @touchend="onPointerUp"
            @click.self="closeAll"
          >
            <transition name="fade">
              <div class="edit-hint" v-if="editMode" @click="editMode=false" style="cursor:pointer;">点击此处或空白退出编辑</div>
            </transition>

            <div class="desktop-scroll" ref="desktopScrollRef">

              <!-- 网格（App + 小组件同层） -->
              <div class="grid-area" ref="gridAreaRef">
                <div class="grid" ref="gridRef">
                  <template v-for="(item, idx) in currentPageItems" :key="'cell-'+idx">

                    <!-- 小组件锚点格：渲染 iframe -->
                    <div
                      v-if="item && item.type==='widget' && item.isAnchor"
                      class="cell widget-anchor-cell"
                      :class="{'edit-mode-widget': editMode}"
                      :style="{
                        gridColumn: 'span ' + item.w,
                        gridRow:    'span ' + item.h
                      }"
                      @mousedown="onCellMousedown($event, idx)"
                      @touchstart.passive="onCellTouchstart($event, idx)"
                      @contextmenu.prevent="onCellLongPress($event, idx)"
                    >
                      <iframe
                        :srcdoc="item.html"
                        sandbox="allow-scripts"
                        scrolling="no"
                        class="widget-cell-frame"
                      ></iframe>
                      <div v-if="editMode" class="del-btn widget-del-btn-grid" @click.stop="deleteItem(idx)">-</div>
                    </div>

                    <!-- 小组件占位格（非锚点，不渲染，grid 自动跳过） -->
                    <template v-else-if="item && item.type==='widget' && !item.isAnchor"></template>

                    <!-- 空格子 -->
                    <div
                      v-else-if="!item"
                      class="cell"
                      :class="{
                        'drag-over':    drag.active && drag.overIdx===idx && !willMerge(idx),
                        'folder-merge': drag.active && willMerge(idx)
                      }"
                      @mouseenter="onCellEnter(idx)"
                      @mousedown="onCellMousedown($event, idx)"
                      @touchstart.passive="onCellTouchstart($event, idx)"
                    ></div>

                    <!-- App / 文件夹 -->
                    <div
                      v-else
                      class="cell"
                      :class="{
                        'dragging':     drag.active && drag.fromIdx===idx && drag.src==='grid',
                        'drag-over':    drag.active && drag.overIdx===idx && drag.fromIdx!==idx && !willMerge(idx),
                        'folder-merge': drag.active && willMerge(idx)
                      }"
                      @mousedown="onCellMousedown($event, idx)"
                      @touchstart.passive="onCellTouchstart($event, idx)"
                      @mouseenter="onCellEnter(idx)"
                      @click="onCellClick($event, idx)"
                      @contextmenu.prevent="onCellLongPress($event, idx)"
                    >
                      <template v-if="item.type==='app'">
                        <div class="icon-wrap" :style="{background: item.color}">
                          <span class="icon-letter">{{item.icon}}</span>
                        </div>
                        <div class="icon-name">{{item.name}}</div>
                        <div v-if="editMode" class="del-btn" @click.stop="deleteItem(idx)">-</div>
                      </template>
                      <template v-else-if="item.type==='folder'">
                        <div class="folder-wrap">
                          <div class="folder-grid">
                            <div
                              v-for="(child,ci) in item.children.slice(0,4)"
                              :key="ci"
                              class="folder-mini"
                              :style="{background: child.color}"
                            ></div>
                          </div>
                        </div>
                        <div class="icon-name">{{item.name}}</div>
                        <div v-if="editMode" class="del-btn" @click.stop="deleteItem(idx)">-</div>
                      </template>
                    </div>

                  </template>
                </div>
              </div>
            </div>

            <!-- 分页点 -->
            <div class="page-dots">
              <span
                v-for="(p,pi) in desktopPages"
                :key="pi"
                class="dot"
                :class="{active: pi===currentPage}"
              ></span>
            </div>

            <!-- Dock -->
            <div class="dock" ref="dockRef">
              <div
                v-for="(dockApp,di) in dockApps.filter(Boolean)"
                :key="dockApp ? dockApp.id : 'dock-empty-'+di"
                class="dock-cell"
                :class="{
                  'dragging':     drag.active && drag.src==='dock' && drag.dockFromIdx===di,
                  'drag-over':    drag.active && drag.dockOverIdx===di && !willMergeDock(di),
                  'folder-merge': drag.active && willMergeDock(di)
                }"
                @mousedown="onDockMousedown($event, di)"
                @touchstart.passive="onDockTouchstart($event, di)"
                @mouseenter="onDockEnter(di)"
                @click="onDockClick($event, di)"
                @contextmenu.prevent="onDockLongPress($event, di)"
              >
                <template v-if="dockApp && dockApp.type==='app'">
                  <div class="icon-wrap" :style="{background: dockApp.color}">
                    <span class="icon-letter">{{dockApp.icon}}</span>
                  </div>
                  <div class="icon-name" style="color:rgba(255,255,255,0.75)">{{dockApp.name}}</div>
                  <div v-if="editMode" class="del-btn" @click.stop="deleteDockItem(di)">-</div>
                </template>
                <template v-else-if="dockApp && dockApp.type==='folder'">
                  <div class="folder-wrap">
                    <div class="folder-grid">
                      <div
                        v-for="(child,ci) in dockApp.children.slice(0,4)"
                        :key="ci"
                        class="folder-mini"
                        :style="{background: child.color}"
                      ></div>
                    </div>
                  </div>
                  <div class="icon-name" style="color:rgba(255,255,255,0.75)">{{dockApp.name}}</div>
                  <div v-if="editMode" class="del-btn" @click.stop="deleteDockItem(di)">-</div>
                </template>
              </div>
            </div>

            <!-- 文件夹弹窗 -->
            <transition name="fade">
              <div class="folder-overlay" v-if="openFolder" @click.self="openFolder=null">
                <div class="folder-popup">
                  <input
                    class="folder-popup-title"
                    v-model="openFolder.name"
                    @change="saveData"
                  />
                  <div class="folder-popup-grid">
                    <div
                      v-for="(child,ci) in openFolder.children"
                      :key="ci"
                      class="folder-popup-item"
                      @mousedown="onFolderItemMousedown($event, ci)"
                      @touchstart.passive="onFolderItemTouchstart($event, ci)"
                      @click="onFolderItemClick(child, ci)"
                    >
                      <div
                        class="icon-wrap"
                        :style="{background: child.color}"
                        :class="{'dragging': drag.active && drag.src==='folder' && drag.folderChildIdx===ci}"
                      >
                        <span class="icon-letter">{{child.icon}}</span>
                      </div>
                      <div class="icon-name" style="color:rgba(255,255,255,0.88)">{{child.name}}</div>
                    </div>
                  </div>
                </div>
                <button class="folder-close-btn" @click="openFolder=null">关闭</button>
              </div>
            </transition>

            <!-- 气泡菜单 -->
            <transition name="fade">
              <div
                class="bubble-menu"
                v-if="bubbleMenu.show"
                :style="bubbleMenuStyle"
                @click.stop
              >
                <div class="bubble-arrow" :class="bubbleMenu.arrowDir"></div>
                <div class="bubble-item" @click="bubbleRename">重命名</div>
                <div class="bubble-sep"></div>
                <div class="bubble-item" @click="bubbleAddWidget">添加小组件</div>
                <div class="bubble-sep"></div>
                <div class="bubble-item" @click="bubbleEditDesktop">编辑桌面</div>
                <div class="bubble-sep"></div>
                <div class="bubble-item danger" @click="bubbleUninstall">卸载</div>
              </div>
            </transition>

            <!-- 小组件选择面板 -->
            <transition name="fade">
              <div class="folder-overlay" v-if="widgetPanelShow" @click.self="widgetPanelShow=false">
                <div class="widget-panel">
                  <div class="widget-panel-title">添加小组件</div>

                  <div class="widget-panel-section-title">系统小组件</div>
                  <div class="widget-panel-scroll">
                    <div
                      v-for="sw in systemWidgets"
                      :key="sw.id"
                      class="widget-panel-card"
                      @click="addWidgetFromPanel(sw)"
                    >
                      <div class="widget-panel-preview">
                        <iframe :srcdoc="sw.html" sandbox="allow-scripts" scrolling="no" class="widget-panel-iframe"></iframe>
                      </div>
                      <div class="widget-panel-name">{{sw.name}}</div>
                    </div>
                  </div>

                  <template v-if="currentBubbleAppWidgets.length">
                    <div class="widget-panel-section-title">{{bubbleMenu.itemName}} 小组件</div>
                    <div class="widget-panel-scroll">
                      <div
                        v-for="aw in currentBubbleAppWidgets"
                        :key="aw.id"
                        class="widget-panel-card"
                        @click="addWidgetFromPanel(aw)"
                      >
                        <div class="widget-panel-preview">
                          <iframe :srcdoc="aw.html" sandbox="allow-scripts" scrolling="no" class="widget-panel-iframe"></iframe>
                        </div>
                        <div class="widget-panel-name">{{aw.name}}</div>
                      </div>
                    </div>
                  </template>

                  <div class="widget-panel-section-title">已导入小组件</div>
                  <div class="widget-panel-scroll" v-if="importedWidgetDefs.length">
                    <div
                      v-for="iw in importedWidgetDefs"
                      :key="iw.id"
                      class="widget-panel-card"
                      @click="addWidgetFromPanel(iw)"
                    >
                      <div class="widget-panel-preview">
                        <iframe :srcdoc="iw.html" sandbox="allow-scripts" scrolling="no" class="widget-panel-iframe"></iframe>
                      </div>
                      <div class="widget-panel-name">{{iw.name}}</div>
                    </div>
                  </div>
                  <div class="widget-panel-empty" v-else>暂无已导入小组件</div>

                  <div class="widget-panel-btns">
                    <button class="widget-import-cancel" @click="widgetPanelShow=false">取消</button>
                    <button class="widget-import-confirm" @click="showImportInput=true">导入 JSON</button>
                  </div>

                  <transition name="fade">
                    <div v-if="showImportInput" style="margin-top:10px">
                      <textarea
                        class="widget-import-textarea"
                        v-model="widgetImportJson"
                        placeholder='粘贴小组件 JSON...'
                      ></textarea>
                      <div class="widget-panel-btns" style="margin-top:8px">
                        <button class="widget-import-cancel" @click="showImportInput=false">取消</button>
                        <button class="widget-import-confirm" @click="confirmImportWidget">确认导入</button>
                      </div>
                      <div class="widget-import-tip" v-if="widgetImportErr" style="color:#ff453a">{{widgetImportErr}}</div>
                    </div>
                  </transition>
                </div>
              </div>
            </transition>

          </div>
        </template>

        <!-- 设置 App -->
        <transition name="app-slide">
          <div class="settings-root" v-if="settingsOpen">

            <!-- 主设置页 -->
            <template v-if="currentPage==='main'">
              <div class="s-nav">
                <button class="s-back-btn" @click="closeSettings">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <span class="s-nav-title">设置</span>
              </div>

              <div class="s-scroll">
                <!-- 搜索框 -->
                <div class="s-search-wrap">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                  <input class="s-search" v-model="searchQuery" placeholder="搜索设置"/>
                </div>

                <!-- 搜索结果 -->
                <template v-if="searchQuery.trim()">
                  <div class="s-card" v-if="searchResults.length">
                    <div
                      v-for="r in searchResults"
                      :key="r.label"
                      class="s-row"
                      @click="pushPage(r.page); searchQuery=''"
                    >
                      <span class="s-row-label">{{r.label}}</span>
                      <svg class="s-row-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                    </div>
                  </div>
                  <div style="text-align:center;color:rgba(0,0,0,0.3);font-size:13px;padding:10px 0" v-else>无匹配结果</div>
                </template>

                <template v-else>
                  <!-- 账号卡片 -->
                  <div class="s-account-card" @click="pushPage('account')">
                    <div class="s-account-avatar" :style="{background: accountUser.avatarColor}">
                      <img v-if="accountUser.avatarImg" :src="accountUser.avatarImg"/>
                      <span v-else>{{accountUser.name.slice(0,1)}}</span>
                    </div>
                    <div class="s-account-info">
                      <div class="s-account-name">{{accountUser.name}}</div>
                      <div class="s-account-id">{{accountUser.id}}</div>
                    </div>
                    <svg class="s-account-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                  </div>

                  <!-- API 设置入口 -->
                  <div class="s-card" @click="pushPage('api')">
                    <div class="s-row">
                      <div class="s-row-icon" style="background:#ff9500">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                      </div>
                      <span class="s-row-label">API 设置</span>
                      <svg class="s-row-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                    </div>
                  </div>

                  <!-- 桌面与个性化 -->
                  <div class="s-card" @click="pushPage('persona')">
                    <div class="s-row">
                      <div class="s-row-icon" style="background:#5856d6">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                      </div>
                      <span class="s-row-label">桌面、锁屏与个性化</span>
                      <svg class="s-row-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                    </div>
                  </div>

                  <!-- 数据管理 -->
                  <div class="s-card">
                    <div class="s-danger-row" @click="clearAllData">清除所有数据</div>
                  </div>
                </template>
              </div>
            </template>

            <!-- 账号页 -->
            <template v-else-if="currentPage==='account'">
              <div class="s-nav">
                <button class="s-back-btn" @click="popPage">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                  返回
                </button>
                <span class="s-nav-title">账号</span>
              </div>
              <div class="s-scroll">
                <div class="s-account-hero">
                  <div class="s-account-hero-avatar" :style="{background: accountUser.avatarColor}">
                    <img v-if="accountUser.avatarImg" :src="accountUser.avatarImg"/>
                    <span v-else>{{accountUser.name.slice(0,1)}}</span>
                  </div>
                  <div class="s-account-hero-name">{{accountUser.name}}</div>
                  <div class="s-account-hero-id">{{accountUser.id}}</div>
                </div>
                <div style="padding:16px 0 0">
                  <div class="s-account-info-card" @click="pushPage('account-info')">
                    <div class="s-account-info-icon">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                    <div class="s-account-info-text">
                      <div class="s-account-info-title">账号信息</div>
                      <div class="s-account-info-sub">{{accountUser.name}} · {{accountUser.id}}</div>
                    </div>
                    <svg class="s-row-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                  </div>
                </div>
                <div style="padding:16px 0 0">
                  <button class="s-logout-btn" @click="closeSettings">退出账号</button>
                </div>
              </div>
            </template>

            <!-- 账号信息页 -->
            <template v-else-if="currentPage==='account-info'">
              <div class="s-nav">
                <button class="s-back-btn" @click="popPage">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                  返回
                </button>
                <span class="s-nav-title">账号信息</span>
              </div>
              <div class="s-scroll">
                <div class="s-card">
                  <div class="s-row" @click="openAvatarModal">
                    <span class="s-row-label">头像</span>
                    <div class="s-account-avatar" style="width:36px;height:36px;font-size:14px;flex-shrink:0" :style="{background: accountUser.avatarColor}">
                      <img v-if="accountUser.avatarImg" :src="accountUser.avatarImg"/>
                      <span v-else>{{accountUser.name.slice(0,1)}}</span>
                    </div>
                    <svg class="s-row-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                  </div>
                  <div class="s-row" @click="openNicknameModal">
                    <span class="s-row-label">昵称</span>
                    <span class="s-row-value">{{accountUser.name}}</span>
                    <svg class="s-row-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                  </div>
                </div>
                <div class="s-group-label">个人信息</div>
                <div class="s-card">
                  <div class="s-row">
                    <span class="s-row-label">性别</span>
                    <input class="s-row-input" v-model="accountUser.gender" placeholder="未设置" @change="saveSettings"/>
                  </div>
                  <div class="s-row">
                    <span class="s-row-label">手机号</span>
                    <input class="s-row-input" v-model="accountUser.phone" placeholder="未设置" @change="saveSettings"/>
                  </div>
                  <div class="s-row">
                    <span class="s-row-label">邮箱地址</span>
                    <input class="s-row-input" v-model="accountUser.email" placeholder="未设置" @change="saveSettings"/>
                  </div>
                  <div class="s-row">
                    <span class="s-row-label">紧急联系人</span>
                    <input class="s-row-input" v-model="accountUser.emergency" placeholder="未设置" @change="saveSettings"/>
                  </div>
                </div>
                <div class="s-group-label">认证与地址</div>
                <div class="s-card">
                  <div class="s-row">
                    <span class="s-row-label">实名认证</span>
                    <span class="s-row-value">未认证</span>
                    <svg class="s-row-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                  </div>
                  <div class="s-row">
                    <span class="s-row-label">地址管理</span>
                    <span class="s-row-value">未设置</span>
                    <svg class="s-row-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                  </div>
                </div>
              </div>

              <!-- 头像弹窗 -->
              <transition name="fade">
                <div class="s-modal-overlay" v-if="avatarModalShow" @click.self="closeAvatarModal">
                  <div class="s-modal-sheet">
                    <div class="s-modal-title">设置头像</div>
                    <div>
                      <div class="s-field-label">本地上传</div>
                      <label style="display:block">
                        <div class="s-field-input" style="text-align:center;cursor:pointer;color:#007aff">点击选择图片</div>
                        <input type="file" accept="image/*" style="display:none" @change="onAvatarFileChange"/>
                      </label>
                    </div>
                    <div>
                      <div class="s-field-label">图片 URL</div>
                      <input class="s-field-input" v-model="avatarUrlInput" placeholder="https://..."/>
                    </div>
                    <div class="s-modal-btns">
                      <button class="s-modal-confirm" @click="confirmAvatar">确认</button>
                      <button class="s-modal-cancel" @click="closeAvatarModal">取消</button>
                    </div>
                  </div>
                </div>
              </transition>

              <!-- 昵称弹窗 -->
              <transition name="fade">
                <div class="s-modal-overlay" v-if="nicknameModalShow" @click.self="nicknameModalShow=false">
                  <div class="s-modal-sheet">
                    <div class="s-modal-title">请设置昵称</div>
                    <input class="s-field-input" v-model="nicknameInput" placeholder="输入昵称"/>
                    <div class="s-modal-btns">
                      <button class="s-modal-confirm" @click="confirmNickname">确认</button>
                      <button class="s-modal-cancel" @click="nicknameModalShow=false">取消</button>
                    </div>
                  </div>
                </div>
              </transition>
            </template>

            <!-- API 设置页 -->
            <template v-else-if="currentPage==='api'">
              <div class="s-nav">
                <button class="s-back-btn" @click="popPage">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                  返回
                </button>
                <span class="s-nav-title">API 设置</span>
              </div>
              <div class="s-scroll">
                <div class="s-card">
                  <div class="s-row">
                    <span class="s-row-label">API Key</span>
                    <input class="s-row-input" v-model="settings.apiKey" placeholder="填写 API Key" type="password" @change="saveSettings"/>
                  </div>
                  <div class="s-row">
                    <span class="s-row-label">Base URL</span>
                    <input class="s-row-input" v-model="settings.apiBaseUrl" placeholder="接口地址" @change="saveSettings"/>
                  </div>
                  <div class="s-row" @click="fetchModels">
                    <span class="s-row-label">模型</span>
                    <span class="s-row-value">{{ settings.apiModel || '点击拉取' }}</span>
                    <span style="font-size:12px;color:#007aff;flex-shrink:0">
                      {{ fetchingModels ? '拉取中...' : '拉取模型' }}
                    </span>
                  </div>
                  <div v-if="fetchModelErr" style="padding:6px 16px;font-size:11px;color:#ff3b30">{{fetchModelErr}}</div>
                </div>

                <!-- 模型列表 -->
                <div class="s-model-list" v-if="modelListShow && fetchedModels.length">
                  <div
                    v-for="m in fetchedModels"
                    :key="m"
                    class="s-model-item"
                    :class="{active: settings.apiModel===m}"
                    @click="selectModel(m)"
                  >
                    <span>{{m}}</span>
                    <svg v-if="settings.apiModel===m" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#007aff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                  </div>
                </div>

                <div class="s-group-label">API 预设</div>
                <div class="s-card">
                  <div class="s-preset-list">
                    <div v-for="p in apiPresets" :key="p.id" class="s-preset-row" @click="loadPreset(p)">
                      <span class="s-preset-name">{{p.name}}</span>
                      <span style="font-size:11px;color:rgba(0,0,0,0.3);margin-right:8px">{{p.provider}}</span>
                      <button class="s-preset-del" @click.stop="deletePreset(p.id)">-</button>
                    </div>
                  </div>
                  <div class="s-row" @click="openSavePreset">
                    <span style="color:#007aff;font-size:14px;text-align:center;width:100%">保存当前配置为预设</span>
                  </div>
                </div>
              </div>

              <!-- 保存预设弹窗 -->
              <transition name="fade">
                <div class="s-modal-overlay" v-if="presetNameShow" @click.self="presetNameShow=false">
                  <div class="s-modal-sheet">
                    <div class="s-modal-title">保存预设</div>
                    <input class="s-field-input" v-model="presetNameInput" placeholder="输入预设名称"/>
                    <div class="s-modal-btns">
                      <button class="s-modal-confirm" @click="savePreset">确认</button>
                      <button class="s-modal-cancel" @click="presetNameShow=false">取消</button>
                    </div>
                  </div>
                </div>
              </transition>
            </template>

            <!-- 桌面与个性化页 -->
            <template v-else-if="currentPage==='persona'">
              <div class="s-nav">
                <button class="s-back-btn" @click="popPage">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                  返回
                </button>
                <span class="s-nav-title">桌面、锁屏与个性化</span>
              </div>
              <div class="s-scroll">
                <div class="s-group-label">壁纸主题</div>
                <div class="s-wallpaper-scroll">
                  <div v-for="wp in ['1','2','3','dark']" :key="wp"
                    class="s-wp-thumb" :class="['wp-'+wp, settings.wallpaper===wp?'active':'']"
                    @click="selectWallpaper(wp)"></div>
                  <div v-for="cw in customWallpapers" :key="cw.id"
                    class="s-wp-thumb"
                    :class="{active: settings.wallpaper===cw.id}"
                    :style="{backgroundImage:'url('+cw.src+')',backgroundSize:'cover',backgroundPosition:'center'}"
                    @click="selectWallpaper(cw.id)"></div>
                  <div class="s-wp-custom" @click="openWpModal">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    添加
                  </div>
                </div>

                <div class="s-group-label">个性化</div>
                <div class="s-card">
                  <div class="s-persona-btns">
                    <div class="s-persona-btn" @click="pushPage('persona-icon')">
                      <div class="s-persona-btn-icon">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                      </div>
                      <span class="s-persona-btn-label">图标</span>
                    </div>
                    <div class="s-persona-btn" @click="pushPage('persona-font')">
                      <div class="s-persona-btn-icon" :style="currentFont!=='system'?{fontFamily:currentFont}:{}">
                        <span style="font-size:22px;font-weight:600;color:#333">Aa</span>
                      </div>
                      <span class="s-persona-btn-label">字体</span>
                    </div>
                  </div>
                </div>

                <div class="s-group-label">显示</div>
                <div class="s-card">
                  <div class="s-row">
                    <span class="s-row-label">全屏</span>
                    <button
                      class="s-toggle"
                      :class="{on: fullscreenMode}"
                      @click="toggleFullscreen(!fullscreenMode)"
                    >
                      <div class="s-toggle-thumb"></div>
                    </button>
                  </div>
                  <div class="s-row">
                    <span class="s-row-label">夜间模式</span>
                    <button
                      class="s-toggle"
                      :class="{on: darkMode}"
                      @click="toggleDarkMode(!darkMode)"
                    >
                      <div class="s-toggle-thumb"></div>
                    </button>
                  </div>
                </div>
              </div>

              <!-- 壁纸上传弹窗 -->
              <transition name="fade">
                <div class="s-modal-overlay" v-if="wpModalShow" @click.self="closeWpModal">
                  <div class="s-modal-sheet">
                    <div class="s-modal-title">添加壁纸</div>
                    <div>
                      <div class="s-field-label">本地上传</div>
                      <label>
                        <div class="s-field-input" style="text-align:center;cursor:pointer;color:#007aff">点击选择图片</div>
                        <input type="file" accept="image/*" style="display:none" @change="onWpFileChange"/>
                      </label>
                    </div>
                    <div>
                      <div class="s-field-label">图片 URL</div>
                      <input class="s-field-input" v-model="wpUrlInput" placeholder="https://..."/>
                    </div>
                    <div class="s-modal-btns">
                      <button class="s-modal-confirm" @click="confirmWpUrl">确认</button>
                      <button class="s-modal-cancel" @click="closeWpModal">取消</button>
                    </div>
                  </div>
                </div>
              </transition>
            </template>

              <template v-else-if="currentPage==='persona-icon'">
              <div class="s-nav">
                <button class="s-back-btn" @click="popPage">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                  返回
                </button>
                <span class="s-nav-title">图标</span>
              </div>
              <div class="s-scroll">
                <div class="s-group-label">App 图标</div>
                <div class="s-card">
                  <div style="display:flex;flex-wrap:wrap;gap:14px;padding:14px 16px">
                    <div
                      v-for="app in desktopAppsFlat"
                      :key="app.id"
                      style="display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer"
                      @click="openIconEdit(app)"
                    >
                      <div
                        class="icon-wrap"
                        :style="{
                          background: app.color,
                          width:'44px', height:'44px',
                          borderRadius:'12px',
                          overflow:'hidden'
                        }"
                      >
                        <img
                          v-if="customIcons[app.id]"
                          :src="customIcons[app.id].value"
                          style="width:100%;height:100%;object-fit:cover"
                        />
                        <span v-else class="icon-letter" style="font-size:18px">{{app.icon}}</span>
                      </div>
                      <span style="font-size:10px;color:#666;max-width:44px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center">{{app.name}}</span>
                    </div>
                  </div>
                </div>
              </div>

              <!-- 图标替换弹窗 -->
              <transition name="fade">
                <div class="s-modal-overlay" v-if="iconEditShow" @click.self="closeIconEdit">
                  <div class="s-modal-sheet">
                    <div class="s-modal-title">替换图标：{{iconEditTarget && iconEditTarget.name}}</div>
                    <div>
                      <div class="s-field-label">本地上传</div>
                      <label style="display:block">
                        <div class="s-field-input" style="text-align:center;cursor:pointer;color:#007aff">点击选择图片</div>
                        <input type="file" accept="image/*" style="display:none" @change="onIconFileChange"/>
                      </label>
                    </div>
                    <div>
                      <div class="s-field-label">图片 URL</div>
                      <input class="s-field-input" v-model="iconUrlInput" placeholder="https://..."/>
                    </div>
                    <div class="s-modal-btns">
                      <button class="s-modal-confirm" @click="confirmIconUrl">确认</button>
                      <button class="s-modal-cancel" @click="closeIconEdit">取消</button>
                    </div>
                  </div>
                </div>
              </transition>
            </template>

            <!-- 字体设置页 -->
            <template v-else-if="currentPage==='persona-font'">
              <div class="s-nav">
                <button class="s-back-btn" @click="popPage">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                  返回
                </button>
                <span class="s-nav-title">字体</span>
              </div>
              <div class="s-scroll">
                <div class="s-group-label">字体预览</div>
                <div class="s-font-preview" :style="currentFont!=='system'?{fontFamily:currentFont}:{}">
                  晓看天色暮看云，行也思君，坐也思君<br/>
                  The price of the shirt is nine pounds and fifteen pence.<br/>
                  世界は絶えず回転し、私たちが出会うまで。<br/>
                  내가 너의 내일이 되기 위해 오늘을 살아왔어.<br/>
                  0123456789 ！@#￥%……&amp;*（）
                </div>

                <div class="s-group-label">已保存字体</div>
                <div class="s-card">
                  <div
                    class="s-preset-row"
                    @click="selectFont('system')"
                  >
                    <span class="s-preset-name" :style="currentFont==='system'?{color:'#007aff'}:{}">系统默认字体</span>
                    <svg v-if="currentFont==='system'" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#007aff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                  </div>
                  <div
                    v-for="fp in fontPresets"
                    :key="fp.id"
                    class="s-preset-row"
                    @click="selectFont(fp.id)"
                  >
                    <span class="s-preset-name" :style="{fontFamily: fp.id, color: currentFont===fp.id ? '#007aff' : '#111'}">{{fp.name}}</span>
                    <svg v-if="currentFont===fp.id" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#007aff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    <button class="s-preset-del" @click.stop="deleteFontPreset(fp.id)" style="margin-left:8px">-</button>
                  </div>
                </div>

                <div class="s-group-label">上传字体</div>
                <div class="s-card">
                  <div class="s-row">
                    <span class="s-row-label">本地字体文件</span>
                    <label style="cursor:pointer;color:#007aff;font-size:13px;flex-shrink:0">
                      选择文件
                      <input type="file" accept=".ttf,.otf,.woff,.woff2" style="display:none" @change="onFontFileChange"/>
                    </label>
                  </div>
                  <div class="s-row" style="flex-direction:column;align-items:stretch;gap:8px;padding-bottom:14px">
                    <span style="font-size:13px;color:rgba(0,0,0,0.4)">字体 URL</span>
                    <div style="display:flex;gap:8px">
                      <input class="s-field-input" v-model="fontUrlInput" placeholder="https://..." style="flex:1"/>
                      <button class="s-modal-confirm" style="flex-shrink:0;padding:10px 14px;font-size:13px;border-radius:10px" @click="onFontUrlChange">导入</button>
                    </div>
                  </div>
                </div>
              </div>
            </template>

          </div>
        </transition>


      </div>

      <div class="home-bar" @click="onHomeClick">
        <div class="home-ind"></div>
      </div>
    </div>
  </div>
</div>

<script src="js/db.js"></script>
<script src="js/store.js"></script>
<script src="js/desktop.js"></script>
<script src="js/settings.js"></script>
<script src="js/app.js"></script>
</body>
</html>
